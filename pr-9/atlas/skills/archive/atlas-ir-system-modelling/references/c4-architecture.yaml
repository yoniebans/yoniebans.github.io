# Atlas IR Reference — C4 Architecture Page
#
# This is the exhaustive reference for what a c4-architecture page can express.
# Nothing should be produced that doesn't align with this template.
# If a concept isn't here, it either doesn't belong or this reference needs extending.
#
# The vocabulary is C4's own. Every term has a precise C4 meaning.
# See https://c4model.com for canonical definitions.
#
# This file is the CONTRACT between Skill 1 (system modelling) and Skill 2 (visual translation).
# Skill 1 populates it. Skill 2 reads it. Neither invents concepts outside it.

page:
  type: c4-architecture
  subject: ""                         # the software system being modelled

# ─────────────────────────────────────────────
# SYSTEM LANDSCAPE (optional)
# ─────────────────────────────────────────────
# Include when the system lives in a broader ecosystem that matters for understanding.
# A system context diagram without a specific focus — shows how multiple systems
# relate within an enterprise, org, or department.
#
# Omit for standalone systems or when the context diagram already captures
# everything the reader needs.
#
# C4 says: "recommended for larger organisations — a bridge into the enterprise
# architecture world."

landscape:
  scope: ""                           # what boundary this landscape covers (org, department, product suite)
  people:
    - name: ""
      description: ""
  systems:
    - name: ""
      description: ""
      ownership: ""                   # internal | external
  relationships:
    - source: ""
      target: ""
      label: ""                       # intent of the relationship — NOT just "uses"
      technology: ""                  # optional — protocol or mechanism
  diagram: ""                         # path to .mmd file

# ─────────────────────────────────────────────
# SYSTEM CONTEXT (L1)
# ─────────────────────────────────────────────
# Always present. The big picture. The starting point.
#
# Shows the system as a box in the centre, surrounded by the people who use it
# and the other systems it interacts with.
#
# C4 says: "Detail isn't important here. Focus on people and software systems
# rather than technologies, protocols and other low-level details. It's the sort
# of diagram that you could show to non-technical people."
#
# KEY RULE: technologies and protocols do NOT appear at this level.
# Relationships are labelled with intent ("views account balances and makes
# payments using"), not mechanism ("JSON/HTTPS").

context:
  system:
    name: ""
    description: ""                   # what it does, in one sentence — value delivered
  people:                             # actors, roles, personas — whoever uses or is affected by the system
    - name: ""
      description: ""
  external_systems:                   # software systems outside your ownership boundary
    - name: ""
      description: ""
  relationships:                      # every line on the context diagram
    - source: ""
      target: ""
      label: ""                       # describe the intent, be specific
                                      # good: "views account balances and makes payments using"
                                      # bad:  "uses"
                                      # NO technology/protocol at this level
  diagram: ""                         # path to .mmd file

# ─────────────────────────────────────────────
# CONTAINERS (L2)
# ─────────────────────────────────────────────
# Almost always present. Zooms inside the system boundary.
#
# A container is a RUNTIME BOUNDARY — an application or data store that needs
# to be running for the system to work. NOT a Docker container (though sometimes
# they coincide).
#
# Examples: server-side web app, SPA, mobile app, database schema, S3 bucket,
# serverless function, file system, shell script.
#
# C4 says: "Shows the high-level shape of the software architecture and how
# responsibilities are distributed across it. Also shows major technology choices
# and how containers communicate with one another."
#
# KEY RULE: technology IS stated at this level. Every container has a technology.
# Relationships between containers state the protocol.
#
# MODELLING DECISIONS the agent must make:
# - Is each thing a container or part of a container?
#   (a JAR/DLL is NOT a container — it organises code within one)
# - Web app: one container or two? (server-side only = one; significant
#   client-side JS = two — they're separate process spaces)
# - Cloud data services (S3, RDS): treat as containers you own, not external systems
# - Queues/topics: model as containers (data stores), not the message bus
# - Microservices single-team: each is a group of containers within one system
# - Microservices multi-team: each is promoted to its own software system
# - Do all containers fit one diagram, or should it be split?
#   Split when: >8-10 containers, or natural groupings exist

containers:
  - name: ""
    technology: ""                    # e.g. "Java and Spring Boot", "JavaScript and Angular",
                                      #       "MySQL Database Schema", "Amazon Web Services S3 Bucket"
    description: ""                   # what it does — responsibilities, not implementation
    container_type: ""                # application | datastore
                                      # applications: web-app, spa, mobile-app, desktop-app,
                                      #               console-app, serverless-function, api-server
                                      # datastores: database, blob-store, file-system, cache,
                                      #             queue, topic, search-index
  relationships:                      # between containers and between containers and external elements
    - source: ""
      target: ""
      label: ""                       # intent of the relationship
      technology: ""                  # protocol — required for inter-container communication
                                      # e.g. "JSON/HTTPS", "MySQL protocol", "gRPC", "AMQP"
  diagram: ""                         # path to .mmd file
  split_diagram: false                # true if containers are split across multiple diagrams
  split_rationale: ""                 # why the split, if split

  # People and external systems reappear on the container diagram as supporting elements.
  # They're already defined in context above — the diagram references them, the IR doesn't
  # duplicate their definitions.

# ─────────────────────────────────────────────
# COMPONENTS (L3)
# ─────────────────────────────────────────────
# Selective. One entry per container that warrants decomposition.
#
# A component is a grouping of related functionality behind a well-defined
# interface, inside a container. Components are NOT separately deployable.
# All components in a container execute in the same process space.
#
# C4 says: "only create component diagrams if you feel they add value, and
# consider automating their creation for long-lived documentation."
#
# MODELLING DECISIONS:
# - Which containers warrant decomposition? Only those where:
#   (a) ≥3 meaningful components exist
#   (b) the components have architectural RELATIONSHIPS worth diagramming
#   (c) a reader gains a sharper mental model than `ls` on the directory
# - Not every container needs one. Peripheral or simple containers: skip.
# - Each component diagram scopes to ONE container.
# - Supporting elements on the diagram: other containers in the system,
#   plus people and external systems connected to the components.

components:
  - container: ""                     # which container this decomposes (matches a name from containers above)
    rationale: ""                     # why this container warrants L3 decomposition
    components:
      - name: ""
        technology: ""                # e.g. "Spring MVC", "Spring Bean", "Express middleware"
        description: ""               # responsibility — what this component does
    relationships:                    # between components, and between components and external elements
      - source: ""
        target: ""
        label: ""
        technology: ""                # optional — intra-container calls often don't have a protocol
    diagram: ""                       # path to .mmd file

# ─────────────────────────────────────────────
# CODE (L4)
# ─────────────────────────────────────────────
# Rarely included. One entry per component that warrants code-level detail.
#
# Shows how a component is implemented — classes, interfaces, functions,
# their relationships (implements, creates, uses, extends).
#
# C4 says: "very much optional... not recommended for anything but the most
# important or complex components. Ideally auto-generated."
#
# In atlas context: almost never include this. The atlas is for orientation,
# not code-level detail. IDEs do this better. Only include when a specific
# design pattern is architecturally significant and can't be understood from
# the component diagram alone.

code:
  - component: ""                     # which component this decomposes
    rationale: ""                     # why code-level detail adds value here
    elements:
      - name: ""
        element_type: ""              # class | interface | enum | function | module
        description: ""
        visibility: ""                # public | package | private (optional)
        methods: []                   # optional — only architecturally significant ones
        fields: []                    # optional — only architecturally significant ones
    relationships:
      - source: ""
        target: ""
        relationship_type: ""         # implements | extends | creates | uses | composes
        label: ""                     # optional detail (e.g. "initialises and pools", multiplicity "1..20")
    diagram: ""                       # path to .mmd or image file (may be auto-generated)

# ─────────────────────────────────────────────
# DYNAMIC VIEWS (optional)
# ─────────────────────────────────────────────
# Show how elements collaborate at runtime to implement a specific feature,
# use case, or flow.
#
# C4 says: "should be used sparingly to show interesting/recurring patterns
# or features that require a complicated set of interactions."
#
# Each dynamic view has numbered interaction steps and can be rendered in
# collaboration style (free-form with numbered arrows) or sequence style
# (UML sequence diagram).
#
# MODELLING DECISIONS:
# - Which flows define the system? Pick the 3-5 that, if understood,
#   make everything else predictable.
# - What abstraction level? Can mix systems, containers, and components
#   in the same dynamic view.
# - Collaboration or sequence style? Agent's choice based on complexity.

dynamic:
  - name: ""                          # e.g. "Sign In Flow", "Message Processing Loop"
    description: ""                   # what this flow demonstrates
    scope: ""                         # what triggers this flow (user action, event, timer...)
    style: ""                         # collaboration | sequence (rendering hint — but still a domain choice
                                      # because it affects how the reader processes the information)
    participants:                     # elements involved in this flow
      - name: ""
        element_type: ""              # person | system | container | component
        description: ""               # optional — role in THIS flow specifically
    steps:                            # numbered, ordered interactions
      - order: 1
        source: ""
        target: ""
        label: ""                     # what happens — be specific
        technology: ""                # optional — protocol if crossing container boundaries
    diagram: ""                       # path to .mmd file

# ─────────────────────────────────────────────
# DEPLOYMENT (optional)
# ─────────────────────────────────────────────
# Shows how container instances map to infrastructure in a specific environment.
# One entry per deployment environment (dev, staging, production).
#
# C4 says: "recommended."
#
# Deployment nodes are NESTED — physical server > VM > Docker container > JVM > app.
# The nesting represents "runs inside."
#
# MODELLING DECISIONS:
# - Which environments to show? At minimum production. Dev if it differs
#   meaningfully (e.g. local Docker vs cloud).
# - How deep to nest? Show enough to convey the operational shape.
#   Don't model every config file.
# - Infrastructure nodes: DNS, load balancers, firewalls, network bridges —
#   include when they're architecturally significant, not just operational detail.

deployment:
  - environment: ""                   # e.g. "production", "development", "staging"
    description: ""                   # what's notable about this environment
    nodes:                            # deployment nodes — can be nested arbitrarily deep
      - name: ""
        technology: ""                # e.g. "Ubuntu 24.04 LTS", "Docker Container", "Eclipse Temurin JDK 21"
        instances: ""                 # optional — e.g. "1..10" for auto-scaling
        children: []                  # nested deployment nodes (same structure, recursive)
        container_instances: []       # containers from L2 that run here (reference by name)
        infrastructure_nodes: []      # DNS services, load balancers, firewalls, network bridges
    relationships:                    # how traffic flows between deployment nodes
      - source: ""
        target: ""
        label: ""
        technology: ""
    diagram: ""                       # path to .mmd file

# ─────────────────────────────────────────────
# SUPPLEMENTARY (optional)
# ─────────────────────────────────────────────
# Content that belongs at the architectural level but isn't a C4 diagram type.
# This is where the atlas extends beyond strict C4 — things the modeller
# judged helpful for orientation at this structural level.
#
# C4 explicitly does NOT cover: domain models, data models, business processes,
# state machines. Those belong on other page types (data-model, sequences).
#
# What DOES belong here:
# - Technology inventory (what's in the stack)
# - Cross-cutting summaries (how data flows end-to-end, key constraints)
# - Metrics that orient (counts of tools, adapters, providers — system scale)
# - Key architectural decisions that affect the shape (not full ADRs, just the
#   headline that helps a reader understand why the structure is what it is)
#
# RULE: if a supplementary item is growing into its own section with sub-structure,
# it probably belongs on a different page type.

supplementary:
  - name: ""
    kind: ""                          # inventory | flow-summary | constraint | metric | decision-headline
    description: ""
    items: []                         # optional — for inventories and metrics
                                      # each item: { name: "", value: "" } or just strings

# ─────────────────────────────────────────────
# REFS
# ─────────────────────────────────────────────
# Maps named concepts in the atlas to their location in the source repo.
# Used by the rendering layer to create clickable links from concept names
# to source code.
#
# Keep to load-bearing references — the 20-50 concepts where a reader would
# naturally want to jump to source. Don't annotate every mention.

refs:
  "": { path: "", symbol: "" }        # concept-slug: { path: file-in-repo, symbol: optional-function-or-class }

# ─────────────────────────────────────────────
# MODELLING NOTES
# ─────────────────────────────────────────────
# The agent's reasoning about modelling decisions. Not rendered into the atlas —
# this is the diagnostic trail for Skill 1. When something looks wrong in the
# output, these notes explain why the agent structured things the way it did.
#
# Examples:
# - "Gateway has only 2 components (adapter + normaliser) — below the L3
#    threshold, skipping component decomposition"
# - "Split container diagram because 12 containers don't fit one chart legibly"
# - "Included deployment for dev and prod because they differ meaningfully
#    (local Docker vs AWS)"
# - "Promoted Service X from container to external system because Team B owns it"

modelling_notes:
  - ""
